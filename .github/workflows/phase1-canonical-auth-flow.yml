name: Complete Canonical Auth Flow Migration

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'phase1/canonical-auth-flow'
    runs-on: ubuntu-latest

    steps:
      - name: Clone migration branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --quiet --depth 1 --branch "$GITHUB_HEAD_REF" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Wire manifest validation into Doctor
        working-directory: repo
        run: python3 .github/phase1-migrate.py

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        working-directory: repo
        run: bun install --frozen-lockfile >/dev/null

      - name: Format and generate docs
        working-directory: repo
        run: |
          bun run format >/dev/null
          bun run lint:fix >/dev/null || true
          bun run format >/dev/null
          bun run docs >/dev/null
          bun run format >/dev/null

      - name: Build
        working-directory: repo
        run: |
          set +e
          bun run build > /tmp/doctor-build.log 2>&1
          status=$?
          tail -n 40 /tmp/doctor-build.log
          exit $status

      - name: Typecheck
        working-directory: repo
        run: bun run typecheck

      - name: Lint
        working-directory: repo
        run: bun run lint

      - name: Test
        working-directory: repo
        run: bun run test

      - name: Knip
        working-directory: repo
        run: bun run knip

      - name: Format check
        working-directory: repo
        run: bun run format:check

      - name: Diff check
        working-directory: repo
        run: git diff --check

      - name: Commit validated migration
        working-directory: repo
        run: |
          rm .github/workflows/phase1-canonical-auth-flow.yml
          rm .github/phase1-migrate.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: validate canonical authentication manifests"
          git push origin HEAD:${{ github.head_ref }}
