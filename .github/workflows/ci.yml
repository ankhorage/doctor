name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply Paradox self-dependency fix
        if: github.head_ref == 'agent/ignore-paradox-self-dependency'
        run: |
          python <<'PY'
          from pathlib import Path

          analysis = Path('src/analysis.ts')
          source = analysis.read_text()
          old = """  if (\n    (await expectsParadox(request.targetPath, packageJson)) &&\n    !hasDependency(devDependencies, '@ankhorage/paradox')\n  ) {\n"""
          new = """  if (\n    packageJson.name !== '@ankhorage/paradox' &&\n    (await expectsParadox(request.targetPath, packageJson)) &&\n    !hasDependency(devDependencies, '@ankhorage/paradox')\n  ) {\n"""
          if old in source:
              analysis.write_text(source.replace(old, new, 1))

          Path('tests/paradoxSelfDependency.test.ts').write_text("""import { mkdtemp, rm, writeFile } from 'node:fs/promises';\nimport { tmpdir } from 'node:os';\nimport { join } from 'node:path';\n\nimport { describe, expect, test } from 'bun:test';\n\nimport { analyzeDoctorTarget } from '../src/analysis.js';\n\ndescribe('Paradox dependency policy', () => {\n  test('does not require @ankhorage/paradox to depend on itself', async () => {\n    const root = await createPublicPackage('@ankhorage/paradox');\n    try {\n      const result = await analyzeDoctorTarget({ cwd: root, mode: 'validate' });\n      expect(result.diagnostics.some((diagnostic) => diagnostic.ruleId === 'package.dependencies.paradox.required')).toBe(false);\n    } finally {\n      await rm(root, { recursive: true, force: true });\n    }\n  });\n\n  test('still requires Paradox for other packages that own Paradox docs generation', async () => {\n    const root = await createPublicPackage('@ankhorage/docs-fixture');\n    try {\n      const result = await analyzeDoctorTarget({ cwd: root, mode: 'validate' });\n      expect(result.diagnostics.some((diagnostic) => diagnostic.ruleId === 'package.dependencies.paradox.required')).toBe(true);\n    } finally {\n      await rm(root, { recursive: true, force: true });\n    }\n  });\n});\n\nasync function createPublicPackage(name: string): Promise<string> {\n  const root = await mkdtemp(join(tmpdir(), 'doctor-paradox-self-'));\n  await writeFile(join(root, 'package.json'), JSON.stringify({\n    name,\n    version: '1.0.0',\n    description: 'Fixture package.',\n    license: 'MIT',\n    type: 'module',\n    publishConfig: { access: 'public' },\n    repository: { type: 'git', url: 'https://example.com/repo.git' },\n    homepage: 'https://example.com',\n    keywords: ['fixture'],\n    files: ['dist'],\n    exports: { '.': './dist/index.js' },\n    packageManager: 'bun@1.3.13',\n    scripts: {\n      build: 'tsc',\n      typecheck: 'tsc --noEmit',\n      lint: 'eslint .',\n      'lint:fix': 'eslint . --fix',\n      format: 'prettier --write .',\n      'format:check': 'prettier --check .',\n      test: 'bun test',\n      knip: 'knip',\n      docs: 'bunx @ankhorage/paradox',\n      changeset: 'changeset',\n      'changeset:status': 'changeset status',\n      'version-packages': 'changeset version',\n    },\n    devDependencies: {\n      '@ankhorage/devtools': '1.0.0',\n      '@changesets/cli': '2.0.0',\n      '@types/bun': '1.0.0',\n      '@types/node': '1.0.0',\n      typescript: '5.0.0',\n    },\n  }, null, 2));\n  await writeFile(join(root, 'paradox.config.ts'), 'export default {};\\n');\n  return root;\n}\n""")

          Path('.changeset/paradox-self-dependency.md').write_text("""---\n'@ankhorage/doctor': patch\n---\n\nDo not require `@ankhorage/paradox` to declare itself as a development dependency when validating Paradox's own package repository.\n""")
          PY

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format implementation
        if: github.head_ref == 'agent/ignore-paradox-self-dependency'
        run: bun run format

      - name: Run build
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)"; then
            bun run build
          else
            echo "No build script found; skipping."
          fi

      - name: Validate Ankhorage repository
        run: bunx @ankhorage/ankh doctor validate .

      - name: Run lint
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.lint ? 0 : 1)"; then
            bun run lint
          else
            echo "No lint script found; skipping."
          fi

      - name: Run format check
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.['format:check'] ? 0 : 1)"; then
            bun run format:check
          else
            echo "No format:check script found; skipping."
          fi

      - name: Run Knip
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.knip ? 0 : 1)"; then
            bun run knip
          else
            echo "No knip script found; skipping."
          fi

      - name: Run tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)"; then
            bun run test
          else
            echo "No test script found; skipping."
          fi

      - name: Run typecheck
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.typecheck ? 0 : 1)"; then
            bun run typecheck
          else
            echo "No typecheck script found; skipping."
          fi

      - name: Check changesets
        if: github.event_name == 'pull_request'
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.['changeset:status'] ? 0 : 1)"; then
            bun run changeset:status
          else
            echo "No changeset:status script found; skipping."
          fi

      - name: Commit implementation
        if: github.head_ref == 'agent/ignore-paradox-self-dependency'
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/agent-fix-paradox-self-dependency.yml .agent-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix paradox self-dependency validation"
          git push origin HEAD:agent/ignore-paradox-self-dependency
