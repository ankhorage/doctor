name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Integrate secret manifest analyzer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/manifestAnalysis.ts')
          source = path.read_text()
          import_line = "import { analyzeSecretStoreManifest } from './secretManifestAnalysis.js';\n"
          anchor = "import type {\n  DoctorDiagnostic,\n"
          if import_line not in source:
              source = source.replace(anchor, import_line + "\n" + anchor)
          call = "  diagnostics.push(...analyzeSecretStoreManifest(infra, manifestPath));\n\n"
          auth_anchor = "  const { auth } = infra;\n"
          if call not in source:
              source = source.replace(auth_anchor, call + auth_anchor)
          path.write_text(source)
          PY

      - name: Install dependencies
        run: bun install

      - name: Apply canonical formatting and docs
        run: |
          bun run lint:fix
          bun run format
          bun run docs

      - name: Run build
        run: bun run build

      - name: Run typecheck
        run: bun run typecheck

      - name: Run Knip
        run: bun run knip

      - name: Run tests
        run: bun run test

      - name: Check changesets
        if: github.event_name == 'pull_request'
        run: bun run changeset:status

      - name: Commit bootstrap output
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore: integrate and format secret diagnostics"
          git push origin HEAD:${{ github.head_ref }}
