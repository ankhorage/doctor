name: Finalize target architecture

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/validate-target-package-architecture
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply final source fix and formatting
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/cliLayoutAnalysis.ts')
          source = path.read_text()
          old = """    for (const match of source.matchAll(pattern)) {
              const specifier = match[1];
              if (specifier !== undefined) {
                specifiers.add(specifier);
              }
            }
          """
          new = """    for (const match of source.matchAll(pattern)) {
              const [, specifier] = match;
              if (specifier !== undefined) {
                specifiers.add(specifier);
              }
            }
          """
          if old not in source:
              raise SystemExit('Expected import match block was not found')
          path.write_text(source.replace(old, new, 1))
          PY
          rm -f .github/target-architecture-lint.log
          bun run format
          bun run lint:fix

      - name: Validate implementation
        run: |
          bun run build
          bun run typecheck
          bun run lint
          bun run format:check
          bun run knip
          bun run test
          bun run docs
          bun dist/cli/standalone.js validate .
          bun run changeset:status

      - name: Remove one-time workflow
        run: rm .github/workflows/finalize-target-architecture.yml

      - name: Commit finalized changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Finalize target architecture validation"
          git push origin HEAD:agent/validate-target-package-architecture
