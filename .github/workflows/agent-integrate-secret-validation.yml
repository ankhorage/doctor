name: Agent Integrate Secret Validation

on:
  push:
    branches:
      - agent/phase2-secret-store-validation

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-secret-store-validation
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      - name: Integrate analyzer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/manifestAnalysis.ts')
          source = path.read_text()
          import_line = "import { analyzeSecretStoreManifest } from './secretManifestAnalysis.js';\n"
          anchor = "import type {\n  DoctorDiagnostic,\n"
          if import_line not in source:
              source = source.replace(anchor, import_line + "\n" + anchor)
          call = "  diagnostics.push(...analyzeSecretStoreManifest(infra, manifestPath));\n\n"
          auth_anchor = "  const { auth } = infra;\n"
          if call not in source:
              source = source.replace(auth_anchor, call + auth_anchor)
          path.write_text(source)
          PY
      - run: bun install --frozen-lockfile
      - run: bun run lint:fix
      - run: bun run format
      - name: Commit integration
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: integrate secret-store manifest diagnostics"
          git push origin HEAD:agent/phase2-secret-store-validation
