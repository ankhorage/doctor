name: Apply Ankh devtools dependency fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/accept-ankh-runtime-devtools-dependency

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - run: bun install --frozen-lockfile

      - name: Patch dependency placement validation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/analysis.ts')
          text = path.read_text()
          old = '''  const devDependencies = isRecord(packageJson.devDependencies)
            ? packageJson.devDependencies
            : null;
          if (!hasDependency(devDependencies, 'typescript')) {'''
          new = '''  const devDependencies = isRecord(packageJson.devDependencies)
            ? packageJson.devDependencies
            : null;
          const dependencies = isRecord(packageJson.dependencies) ? packageJson.dependencies : null;
          if (!hasDependency(devDependencies, 'typescript')) {'''
          if old not in text:
              raise SystemExit('Expected devDependencies block not found')
          text = text.replace(old, new, 1)

          old = '''  if (expectsDevtools(packageJson) && !hasDependency(devDependencies, '@ankhorage/devtools')) {
            diagnostics.push('''
          new = '''  const devtoolsDependencyMap =
            packageJson.name === '@ankhorage/ankh' ? dependencies : devDependencies;
          if (expectsDevtools(packageJson) && !hasDependency(devtoolsDependencyMap, '@ankhorage/devtools')) {
            diagnostics.push('''
          if old not in text:
              raise SystemExit('Expected devtools validation block not found')
          text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - run: bun run format
      - run: bun run lint
      - run: bun test tests/devtoolsDependencyPlacement.test.ts

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/analysis.ts tests/devtoolsDependencyPlacement.test.ts
          git commit -m "Accept Ankh runtime devtools dependency"
          git push
